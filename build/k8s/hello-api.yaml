apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
  namespace: default
  labels:
    app: hello-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:
        - name: hello-api
          image: ghcr.io/wang-yu-che/quantum/hello-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 15 # ✅ 稍微延长，减少启动瞬间的探测压力
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 30 # ✅ 给足够时间初始化
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 800m
              memory: 160Mi
          volumeMounts:
            - name: timezone
              mountPath: /etc/localtime
      volumes:
        - name: timezone
          hostPath:
            path: /usr/share/zoneinfo/Asia/Shanghai

---

apiVersion: v1
kind: Service
metadata:
  name: hello-api-svc
  namespace: default
spec:
  ports:
    - port: 8888
      targetPort: 8888
  selector:
    app: hello-api

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hello-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-api
  minReplicas: 1
  maxReplicas: 2  # ✅ 关键修改 1：从 3 降到 2。
    # 理由：API(2) + RPC(2) = 4 Pods。
    # 4 * 160Mi = 640Mi，加上系统占用的 800Mi-1GB，正好能跑稳。
  # 如果设为 3，两个服务同时扩容会导致内存直接过 2G，机器卡死。
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80 # ✅ 关键修改 2：提高阈值。70% 太容易达到了，80% 更稳。
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 90 # ✅ 关键修改 3：提高阈值。内存到 90% 再扩容。
  behavior:
    scaleUp:
      # ✅ 关键修改 4：大幅拉长观察窗口
      # 压力必须持续 180 秒（3 分钟）才允许扩容。
      # 这能确保你的 GitHub Action 跑完部署、程序完成预热后，HPA 再介入。
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1 # 每次只准加 1 个 Pod，不要瞬间翻倍
          periodSeconds: 60