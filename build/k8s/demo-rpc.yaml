apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-rpc
  namespace: default
  labels:
    app: demo-rpc
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: demo-rpc
  template:
    metadata:
      labels:
        app: demo-rpc
    spec:
      containers:
      - name: demo-rpc
        image: ghcr.io/wang-yu-che/quantum/demo-rpc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8088
        readinessProbe:
          tcpSocket:
            port: 8088
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8088
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 800m
            memory: 160Mi
        volumeMounts:
        - name: timezone
          mountPath: /etc/localtime
      volumes:
        - name: timezone
          hostPath:
            path: /usr/share/zoneinfo/Asia/Shanghai

---

apiVersion: v1
kind: Service
metadata:
  name: demo-rpc-svc
  namespace: default
spec:
  ports:
  - port: 8088
    targetPort: 8088
  selector:
    app: demo-rpc

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-rpc-hpa-c
  namespace: default
  labels:
    app: demo-rpc-hpa-c
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-rpc
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-rpc-hpa-m
  namespace: default
  labels:
    app: demo-rpc-hpa-m
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-rpc
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
