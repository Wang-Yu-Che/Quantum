apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-rpc
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hello-rpc
  template:
    metadata:
      labels:
        app: hello-rpc
    spec:
      containers:
        - name: hello-rpc
          image: ghcr.io/wang-yu-che/quantum/hello-rpc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15 # ✅ 稍微延长，减少启动瞬间的探测压力
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30 # ✅ 给足够的时间初始化
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 800m
              memory: 160Mi
          volumeMounts:
            - name: timezone
              mountPath: /etc/localtime
      volumes:
        - name: timezone
          hostPath:
            path: /usr/share/zoneinfo/Asia/Shanghai

---

apiVersion: v1
kind: Service
metadata:
  name: hello-rpc-svc
  namespace: default
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: hello-rpc

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hello-rpc-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-rpc
  minReplicas: 1
  maxReplicas: 2  # ✅ 关键：2C2G 环境下，单个服务上限设为 2 比较稳妥
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 85 # ✅ 提高阈值，防止启动瞬间误扩容
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 90 # ✅ 提高阈值，内存达到 90% 再扩容
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 180 # ✅ 关键：压力持续 3 分钟才扩容，躲过启动峰值
      policies:
        - type: Pods
          value: 1 # ✅ 限制：每次扩容只增加 1 个 Pod，防止瞬间内存翻倍
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300 # 5 分钟内负载低才缩容，防止频繁抖动