<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术学习 - 正在建设中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            /* 背景使用深蓝色渐变 */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面背景点阵装饰 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            z-index: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            padding: 20px;
        }

        /* 磨砂玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 动画图标容器 */
        .icon-box {
            margin-bottom: 24px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 1px;
            /* 文字渐变效果 */
            background: linear-gradient(to right, #00d2ff, #9ad8eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        /* 底部备案号容器 */
        footer {
            z-index: 1;
            padding-bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .beian-link {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .beian-link:hover {
            color: #00d2ff;
        }

        /* 两个备案号在宽屏下横向排列 */
        @media (min-width: 768px) {
            footer {
                flex-direction: row;
                justify-content: center;
                gap: 20px;
            }
        }

        /* 手机端适配 */
        @media (max-width: 480px) {
            .glass-card { padding: 40px 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="glass-card">
        <div class="icon-box">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 18L22 12L16 6" stroke="#00d2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 6L2 12L8 18" stroke="#00d2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13 4L11 20" stroke="#00d2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>网站正在建设中</h1>
        <p>本网站供技术学习与研究使用</p>
    </div>
</div>

<footer>
    <!-- ICP 备案 -->
    <a class="beian-link" href="https://beian.miit.gov.cn/" target="_blank">
        京ICP备2026015948号
    </a>

    <!-- 公网安备 -->
    <a class="beian-link" href="https://beian.mps.gov.cn/#/query/webSearch?code=11010602202416" rel="noreferrer" target="_blank">
        <img src="/assets/net.png" style="width:16px; height:16px; margin-right:5px;" alt="公安徽标">
        京公网安备11010602202416号
    </a>
</footer>

</body>
</html>
