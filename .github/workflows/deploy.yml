name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

  workflow_dispatch:   # ✅ 手动触发

jobs:
  deploy:
    # ✅ 防止 build 失败也触发 deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

      - name: test cluster connection
        run: |
          kubectl get nodes

      - name: deploy to k3s
        run: |
          kubectl apply -f k8s/

      # ✅ 等待部署完成（非常关键）
      - name: rollout status
        run: |
          kubectl rollout status deployment/hello-api -n default
          kubectl rollout status deployment/hello-rpc -n default