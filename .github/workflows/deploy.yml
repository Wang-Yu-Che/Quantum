name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

  workflow_dispatch:   # ✅ 手动触发

jobs:
  deploy:
    # ✅ 防止 build 失败也触发 deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

      - name: test cluster connection
        run: |
          kubectl get nodes

      - name: lowercase repo
        id: repo
        run: echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: set tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
          # 如果是 Build 流程触发的，获取 Build 流程那个 commit 的 SHA
          echo "IMG_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          else
            # 如果是手动触发 (workflow_dispatch)，获取当前分支最新的 commit SHA
            # 这通常就是你刚刚 Build 出来的那个镜像的 Tag
            echo "IMG_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi

      # ✅ 优化：部署 RPC。先改文件再 apply，保证只启动一次 Pod
      - name: deploy rpc
        run: |
          sed -i "s|image: .*hello-rpc.*|image: ghcr.io/${{ steps.repo.outputs.repo }}/hello-rpc:${{ env.IMG_TAG }}|g" build/k8s/hello-rpc.yaml
          kubectl apply -f build/k8s/hello-rpc.yaml
          # 等待 RPC 就绪，超时设为 3 分钟防死锁
          kubectl rollout status deployment/hello-rpc -n default --timeout=180s

      # ✅ 优化：部署 API。同理，RPC 稳了之后再开始 API
      - name: deploy api
        run: |
          sed -i "s|image: .*hello-api.*|image: ghcr.io/${{ steps.repo.outputs.repo }}/hello-api:${{ env.IMG_TAG }}|g" build/k8s/hello-api.yaml
          kubectl apply -f build/k8s/hello-api.yaml
          # 等待 API 就绪
          kubectl rollout status deployment/hello-api -n default --timeout=180s