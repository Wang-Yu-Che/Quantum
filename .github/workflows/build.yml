name: Build

on:
  workflow_dispatch:

env:
  # 注意：这里保持原样，也可以在 job 里动态获取
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # --- API 构建任务 ---
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: lowercase repo
        id: repo
        run: echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: login ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: build and push restful images
        run: |
          # 遍历 restful 文件夹下的每一个子目录
          for dir in restful/*/; do
            # 检查子目录下是否有 Dockerfile
            if [ -f "${dir}Dockerfile" ]; then
              # 提取文件夹名 (如: hello)
              service_name=$(basename "$dir")
              # 构造完整的镜像名 (文件夹名-api)
              image_tag="ghcr.io/${{ steps.repo.outputs.repo }}/${service_name}-api:${{ github.sha }}"
          
              echo "------------------------------------------"
              echo "🔨 Building API: $service_name"
              echo "🏷️ Tag: $image_tag"
          
              docker build -t "$image_tag" -f "${dir}Dockerfile" .
              docker push "$image_tag"
            fi
          done

  # --- RPC 构建任务 ---
  build-rpc:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: lowercase repo
        id: repo
        run: echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: login ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: build and push rpc images
        run: |
          # 遍历 service 文件夹下的每一个子目录
          for dir in service/*/; do
            # 检查子目录下是否有 Dockerfile
            if [ -f "${dir}Dockerfile" ]; then
              # 提取文件夹名 (如: hello)
              service_name=$(basename "$dir")
              # 构造完整的镜像名 (文件夹名-rpc)
              image_tag="ghcr.io/${{ steps.repo.outputs.repo }}/${service_name}-rpc:${{ github.sha }}"
          
              echo "------------------------------------------"
              echo "🔨 Building RPC: $service_name"
              echo "🏷️ Tag: $image_tag"
          
              docker build -t "$image_tag" -f "${dir}Dockerfile" .
              docker push "$image_tag"
            fi
          done